<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasktify Screen Index</title>
  <style>
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:#F6F7F4; color:#18201B; }
    .page { width:1200px; margin:0 auto; padding:32px; }
    .card { background:#FFF; border:1px solid #D8DED8; border-radius:24px; padding:24px; }
    h1,p,ol { margin:0; } h1 { font-size:36px; line-height:44px; margin-bottom:12px; } p,li { font-size:16px; line-height:24px; color:#5E6A61; }
    ol { margin-top:16px; padding-left:22px; display:grid; gap:8px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Tasktify Screen Index</h1>
      <p>Separate HTML pages for cleaner Figma import.</p>
      <ol>
        <li>01 Welcome</li>
        <li>02 Permission Explainer</li>
        <li>03 Connect Channels</li>
        <li>04 Home / Inbox</li>
        <li>05 Review Task</li>
        <li>06 Task Detail</li>
        <li>07 At Risk</li>
        <li>08 Settings</li>
      </ol>
    </div>
  </div>
</body>
</html>
